services:
  url-shortener:
    image: registry.digitalocean.com/do-interview/url-shortener:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      ADDR: ":8080"
      BASE_URL: https://YOUR_DOMAIN
      DATABASE_PATH: /app/data/shortener.db
    volumes:
      - ./data:/app/data

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - url-shortener
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
